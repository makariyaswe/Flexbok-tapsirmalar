<!DOCTYPE html>
<html>
    <head>
        <style>
            .box{
                height: 60px;
                border: 2px solid black;
                display: flex;
                flex-direction: row;
                align-items: center;
                background-color: blueviolet;
            }
            .home{
                margin-left: 10px;
            }
            .input-box{
                flex: 1;
                margin-left: 45px;
                margin-right: 45px;
            }
            .btn-box{
                margin-left: 10px;
            }
            p{
                margin-top: 0;
                margin-bottom: 0;
            }
            input{
                width: 100%;
                border-radius: 20px;
            }
        </style>
    </head>
    <body>
        <div class="box">
            <div class="home">
                <p>Home</p>
            </div>
            <div class="input-box">
                <input type="text" placeholder="Search">
            </div>
            <div class="btn-box">
                <button style="color: white; background-color: blueviolet; border:1px solid white">Dowland</button>
            </div>
        </div>
    </body>
</html>
